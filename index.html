<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Webhook Deleter</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="deleter">
      <form id="delete-form" class="delete-box">
        <h1>Webhook Deleter</h1>
        <input
          id="webhook-url"
          type="url"
          inputmode="url"
          autocomplete="off"
          spellcheck="false"
          placeholder="https://discord.com/api/webhooks/..."
          required
        >
        <label class="toggle-row" for="silent-toggle">
          <input id="silent-toggle" type="checkbox" checked>
          <span class="toggle-switch" aria-hidden="true"></span>
          <span>Delete completely silently</span>
        </label>
        <input
          id="farewell-message"
          class="farewell-input"
          type="text"
          autocomplete="off"
          placeholder="Farewell Message"
          value="Bye!"
          hidden
        >
        <button id="delete-button" type="submit">Delete</button>
        <p id="message" class="message" role="status" aria-live="polite"></p>
      </form>
    </main>

    <script src="app.js"></script>
  </body>
</html>
